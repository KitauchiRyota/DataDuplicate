<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <title>データ複製App</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    label,
    button {
      cursor: pointer;
    }

    /* 共通スタイル */
    .modern-text-input {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background-color: #ffffff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    /* プレースホルダー */
    .modern-text-input::placeholder {
      color: #9aa0a6;
    }

    /* フォーカス時 */
    .modern-text-input:focus {
      outline: none;
      border-color: #4c9ffe;
      box-shadow: 0 0 0 3px rgba(76, 159, 254, 0.2);
    }

    /* textarea専用 */
    textarea {
      min-height: 120px;
      resize: vertical;
    }

    /* 全体 */
    .radio {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 16px;
      position: relative;
    }

    /* 本体を隠す */
    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    /* カスタム円 */
    .radio-custom {
      width: 18px;
      height: 18px;
      border: 2px solid #c5cbd3;
      border-radius: 50%;
      display: inline-block;
      position: relative;
      transition: border-color 0.2s ease;
    }

    /* 中の丸 */
    .radio-custom::after {
      content: "";
      width: 10px;
      height: 10px;
      background: #4c9ffe;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s ease;
    }

    /* チェック時 */
    .radio input:checked + .radio-custom {
      border-color: #4c9ffe;
    }

    .radio input:checked + .radio-custom::after {
      transform: translate(-50%, -50%) scale(1);
    }

    /* フォーカス時（キーボード操作対応） */
    .radio input:focus + .radio-custom {
      box-shadow: 0 0 0 3px rgba(76, 159, 254, 0.2);
    }
        
    .my-h2{
      font-size: 1.5rem;
      font-weight: bold;
      margin: 0.83em 0; 
      margin-top: 1.7em;
    }

    .my-h3{
      font-size: 1.2rem;
      font-weight: 500;
      text-decoration: underline;
      margin: 0.83em 0; 
    }

    .my-h4{
      font-size: 1.1rem;
      font-weight: 470;
      text-decoration: underline;
      margin: 0.83em 0; 
    }

    .card-item {
      background: #f5f5f5;
      padding: 0.8em 1em;
      margin-bottom: 0.6em;
      border-radius: 8px;
      font-weight: 500;
    }

    .required-label::after {
      content: " *";
      color: #e60000;
      font-weight: bold;
    }

    .tooltip {
      position: relative;
      display: inline-block;
      margin-left: 5px;
      cursor: pointer;
      color: #ffffff;
      font-weight: bold;
      border-radius: 50%;
      background-color: #66cdaa;
      width: 18px;
      height: 18px;
      text-align: center;
      font-size: 12px;
      line-height: 18px;
    }

    .tooltip-text {
      visibility: hidden;
      opacity: 0;
      width: 220px;
      background-color: #333;
      color: #fff;
      text-align: left;
      padding: 8px;
      border-radius: 6px;
      position: absolute;
      bottom: -850%;
      left: -500%;
      transform: translateX(50%);
      transition: opacity 0.2s;
      font-size: 15px;
      z-index: 100;
    }

    .tooltip:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
    }

    .modern-btn{
      background: #4f46e5;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.25s;
    }

    .modern-btn:hover{
      background:#4338ca;
      transform: scale(1.03);
    }

    .modern-btn:active{
      transform: scale(0.98);
    }

  </style>
</head>

<body>
  <h1>データ複製App</h1>

  <p>このWebアプリケーションでは、Googleドライブ上のデータを複製する機能を提供しています。</p>

  <form id="duplicate-data">
  <ol>
    <!-- 1.元データのURL -->
    <li class="my-h2">
      <label class="required-label" for="origin-data">元となるデータのURL</label>
    </li>
    <input class="modern-text-input" id="origin-data" type="text" required>


    <!-- 2.作りたい個数 -->
    <li class="my-h2">
      <label class="required-label" for="qty">作りたい個数</label>
    </li>

    <!-- 2-A.個数指定 -->
    <label class="radio my-h3">
      <input type="radio" name="qty-desig" value="qty-num">
      <span class="radio-custom"></span>
      A.個数を指定して作成
    </label>

    <div id='qty-num-options' class='qty-opt' style='display:none; margin-bottom:48px;'>
      <p class="card-item">
          <label>
            <span class="required-label">新たに作る個数</span><br>
            <input class="modern-text-input" style="width:20%;" id="qty-num" type="number" min=1>
          </label>
      </p>

      <p class="card-item">
          <label>
            コピー後のデータ名（省略可）
            <input class="modern-text-input" id="dest-name" type="texet" placeholder="空欄の場合、「（元のデータ名）_コピー1」の形式で、末尾の数字がカウントアップされます。">
          </label>
      </p>

      <div class="card-item" style="margin-left:1.7em;">
        <div class="my-h4">i.データ名の「★」を次のルールで置き換える（省略可）
          <span class="tooltip">?
            <span class="tooltip-text">
            上で入力するデータ名の「★」の位置を、ここで選んだ規則に置き換えることができます。<br>
            この方法で複製する場合、データ名に含まれる一つ目の「★」は、必ず下の規則で置き換わります。<br>
            置き換えを使用しない場合、「★」は使用しなくてもかまいません。
            </span>
          </span>
        </div>

        <label class="radio">
          <input type="radio" name="rule-type" value="num" checked>
          <span class="radio-custom"></span>
          1、2、3、・・・
        </label>

        <label class="radio">
          <input type="radio" name="rule-type" value="alp">
          <span class="radio-custom"></span>
          A、B、C・・・
        </label>
      </div>
    </div>

    <!-- 2-B.リストから作成 -->
    <label class="radio my-h3" style="margin-top:2em;">
      <input type="radio" name="qty-desig" value="list">
      <span class="radio-custom"></span>
      B.リスト分作成
    </label>
    <div id='qty-list-options' class='qty-opt card-item' style='display:none;'>
      <label>
        <span class="required-label">リストを入力（改行で区切れます）</span><br>
        <textarea class="modern-text-input" id="qty-list"></textarea>
      </label>
    </div>
    <!-- Todo：数値か、空欄かなどバリデーション -->

    <!-- 3.作成先のURL -->
    <li class="my-h2">
      <label class="required-label" for="data-dest">複製先のフォルダ元のURL</label>
      <!-- Todo:省略可能にして、省略した場合は、元データと同じ場所に作るように -->
    </li>
    <input class="modern-text-input" id="data-dest" type="text" required> 
    <!-- placeholder="Todo:空欄の場合、元データと同じ場所に複製します。"> -->

    <!-- Todo：Googleドライブ側のデータ名に使える文字のルールについて、 -->

    <div id="statuses" style="margin-top:10px;">
      <div style="font-weight:bold; color:red;"><div id="status"></div></div>
      <div style="font-weight:bold; color:green;"><div id="success-message" style="display:none;">成功！</div></div>
    </div>

    <button id="run-duplicate-btn" class="modern-btn" style="margin-top:10px;" type="submit">複製！</button>
  </ol>
  </form>

  <div id="statusMessage"></div>

  <script>

    // 複製方法の選択によって表示を変更
    const radios = document.querySelectorAll('input[name="qty-desig"]');
    const qtyNumDiv = document.getElementById('qty-num-options');
    const qtyNumInput = document.getElementById('qty-num');
    const qtyListDiv = document.getElementById('qty-list-options');
    const qtyListTextarea = document.getElementById('qty-list');
    radios.forEach(radio => {
      radio.addEventListener('change',()=>{
        if(radio.value === 'qty-num'){
          qtyNumDiv.style.display = 'block';
          qtyNumInput.required = true;
          qtyListDiv.style.display = 'none';
          qtyListTextarea.required = false;
        }else if(radio.value === 'list'){
          qtyNumDiv.style.display = 'none';
          qtyNumInput.required = false;
          qtyListDiv.style.display = 'block';
          qtyListTextarea.required = true;
        }else{
          qtyNumDiv.style.display = 'none';
          qtyNumInput.required = false;
          qtyListDiv.style.display = 'none';
          qtyListTextarea.required = false;
        }
      })
    });

    /**
     * 数値を、Aからの個数に対応するアルファベット（26以上は、「AA、AB、・・・」の形式）に変換する関数
     * @param {integer} n 変換元の数値
     * @return {string} result 変換後のアルファベットの文字列
     */
    function numToAlp(n) {
      let result ='';
      while (n > 0) {
        n--; 
        result = String.fromCharCode(65 + (n % 26)) + result;
        n = Math.floor(n / 26);
      }
      return result;
    }

    /**
     * 複製方法から、データの個数・データ名の配列のオブジェクトを返す関数
     * @param {string} desig 複製方法（inputのvalue）
     * @return {object} 複製方法、データの個数、データ名の配列を格納しているオブジェクト
    */
    function createDestNameObject(desig){

      let nameArray = [];

      switch(desig){
        case 'qty-num': // 個数を指定して複製の場合

          const qty = document.getElementById('qty-num').value;
          const destName = document.getElementById('dest-name').value.trim();

          if(destName){ // データ名が入力されている場合

            const nameRule = document.querySelector('input[name="rule-type"]:checked').value;

            switch(nameRule){
              case 'num':
                for(let i=0 ; i<qty ; i++){
                  nameArray.push(destName.replace('★',i+1));
                }
                break;
              case 'alp':
                for(let i=0 ; i<qty ; i++){
                  nameArray.push(destName.replace('★',numToAlp(i+1)));
                }
                break;
            }

            return {
              qtyDesig: 'num-and-name',
              qty: qty,
              destNames: nameArray
            };

          }else{ // データ名が空白文字の時
            return {
              qtyDesig: 'num-only',
              qty: qty,
              destNames: nameArray
            };
          }
          break;
        
        case 'list': // リストから複製の場合
          const qtyList = document.getElementById('qty-list').value;
          // 改行で分割し、空白文字の行を除去
          nameArray = qtyList
            .split("\n")
            .map(name => name.trim())
            .filter(name => name !== "");

          console.log('list :' + nameArray);
          console.log('type of list ;' + typeof(nameArray));

          return {
            qtyDesig: 'list',
            qty: nameArray.length,
            destNames: nameArray
          };
          break;
      }
    }

    const statusDiv = document.getElementById('status');
    const successMessage = document.getElementById('success-message');
    const duplicateDataForm = document.getElementById('duplicate-data');
    const submitButton = document.getElementById("run-duplicate-btn");

    duplicateDataForm.addEventListener('submit',async(e) =>{
      e.preventDefault();
      statusDiv.textContent = '';
      successMessage.style.display = 'none';

      const selectedDesig = document.querySelector('input[name="qty-desig"]:checked');

      if(!selectedDesig){
        statusDiv.textContent = '「2.作りたい個数」を選択して下さい！';
        // alert('複製方法を選択して下さい！');
        return;
      }

      const nameObj = createDestNameObject(selectedDesig.value);
      // console.log(nameObj.qty);
      // console.log(nameObj.qtyDesig);
      // console.log(nameObj.destNames);

      const srcUrl = document.getElementById('origin-data').value.trim();
      const destUrl = document.getElementById('data-dest').value.trim();

      // console.log(inputUrl + ',' + typeof(inputUrl));
      callDuplication(srcUrl, nameObj, destUrl);
    })

    function callDuplication(srcUrl, nameObj, destUrl){
      
      submitButton.disabled = true; // ボタンを無効化

      let dotCount = 0;
      submitButton.textContent = '処理中';

      const intervalId = setInterval(() => {
        dotCount = dotCount % 4; // 点の数を0, 1, 2, 3, 0, ...とループさせる
        const dots = "・".repeat(dotCount++);
        submitButton.textContent = `処理中${dots}`;
      }, 500);

      google.script.run.withSuccessHandler(res =>{
        console.log(res);
        successMessage.style.display = 'block';

        // ボタンを初期化
        clearInterval(intervalId); // ★ アニメーションを停止
        submitButton.disabled = false; // ★ ボタンを再度有効化
        submitButton.textContent = "複製！";
      })
      .withFailureHandler(err => {
        statusDiv.textContent = 'エラー：' + err;
        console.error(err);

        // ボタンを初期化
        clearInterval(intervalId); // ★ アニメーションを停止
        submitButton.disabled = false; // ★ ボタンを再度有効化
        submitButton.textContent = "複製！";

        return err;
      }).main(srcUrl, nameObj, destUrl);
    }


    // （参考用）以降は議事録送信プログラム

    const selectElement = document.getElementById('weekdaySelect');
    const statusMessageDiv = document.getElementById('statusMessage');

    /**
     * 送信ボタンが押されたときにGAS関数を呼び出す
     */
    function sendMinute() {
      const selectedValue = selectElement.value; // 選択されたoptionのvalueを取得

      // エラーメッセージとステータスをクリアし、ローディングを表示
      statusMessageDiv.innerText = '';
      // errorMessageDiv.innerText = '';
      // loadingIndicator.style.display = 'block';

      if (selectedValue) { // 何か選択された場合のみGASを呼び出す
        google.script.run
          .withSuccessHandler(function(mes) {
            // 成功した場合の処理
            statusMessageDiv.innerText = mes+"送信しました！";
            // loadingIndicator.style.display = 'none'; // ローディング非表示
            // setTimeout(() => statusMessageDiv.innerText = '', 3000); // 3秒後にメッセージを消す
          })
          .withFailureHandler(function() {
            // 失敗した場合の処理
            statusMessageDiv.innerText = "エラー：送信できませんでした";
            // errorMessageDiv.innerText = 'エラー: ' + error.message;
            // loadingIndicator.style.display = 'none'; // ローディング非表示
          })
          .getGreetingMessage(selectedValue); // GASの関数と選択値を引数として渡す
      } else {
        // 「選択してください」が選ばれた場合などの処理
        statusMessageDiv.innerText = 'クラスを選択してください。';
        // loadingIndicator.style.display = 'none';
      }
    }

  </script>
</body>

</html>
